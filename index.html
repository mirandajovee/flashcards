<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Liquid Flash" />
<meta name="theme-color" content="#eef1ee" />
<title>Liquid Flash</title>
<style>
  :root {
    --rule: 2.4rem;                       /* note-card line spacing */
    --ink: #3c4656;                       /* soft slate text */
    --ink-soft: #6d7891;
    --rule-line: rgba(120, 140, 175, 0.22);
    --margin-line: rgba(206, 132, 152, 0.40);
    --glass: rgba(255, 255, 255, 0.42);
    --glass-edge: rgba(255, 255, 255, 0.75);
    --accent: #7fa6a8;
    --radius: 26px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    color: var(--ink);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.25rem 3rem;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    background:
      radial-gradient(1100px 700px at 12% 8%,  #e9f0f6 0%, rgba(233,240,246,0) 60%),
      radial-gradient(1000px 800px at 88% 18%, #eef0ec 0%, rgba(238,240,236,0) 58%),
      radial-gradient(1200px 900px at 50% 110%, #f1eaf2 0%, rgba(241,234,242,0) 60%),
      linear-gradient(160deg, #e8eef5 0%, #eef1ee 45%, #f2ecf2 100%);
  }

  /* soft drifting light blobs behind the glass */
  .ambient { position: fixed; inset: -20% -20% -20% -20%; z-index: 0; pointer-events: none; filter: blur(60px); opacity: 0.55; }
  .ambient span { position: absolute; width: 42vmax; height: 42vmax; border-radius: 50%; mix-blend-mode: screen; animation: drift 26s ease-in-out infinite; }
  .ambient .a { background: #b9d4e8; top: -10%; left: -8%; }
  .ambient .b { background: #cfe6d8; bottom: -14%; right: -6%; animation-delay: -8s; }
  .ambient .c { background: #e3d2ec; top: 30%; right: 20%; animation-delay: -15s; }
  @keyframes drift {
    0%,100% { transform: translate(0,0) scale(1); }
    50%     { transform: translate(3vmax, -4vmax) scale(1.08); }
  }

  .wordmark {
    position: relative; z-index: 1;
    font-size: 1.7rem; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 1.4rem;
    background: linear-gradient(120deg, #7fa6a8, #9b8fc0 55%, #c98ea0);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity: 0.9;
  }

  header {
    position: relative; z-index: 1;
    text-align: center;
    margin-bottom: 1.5rem;
  }
  header h1 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  header .count { margin-top: 0.35rem; font-size: 0.85rem; color: var(--ink-soft); letter-spacing: 0.04em; opacity: 0.8; }

  /* ---------- card ---------- */
  .stage { position: relative; z-index: 1; perspective: 1600px; }

  .card {
    position: relative;
    width: min(86vw, 560px);
    aspect-ratio: 5 / 3;
    trans-style: preserve-3d;
    transform-style: preserve-3d;
    transition: transform 0.62s cubic-bezier(.2,.7,.2,1);
    cursor: pointer;
    animation: float 7s ease-in-out infinite;
  }
  .card.flipped { transform: rotateY(180deg); }

  @keyframes float {
    0%,100% { translate: 0 0; }
    50%     { translate: 0 -8px; }
  }

  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    padding: calc(var(--rule) * 1.15) 2.1rem 1.6rem 3.2rem;

    /* liquid glass */
    background: var(--glass);
    backdrop-filter: blur(22px) saturate(1.7);
    -webkit-backdrop-filter: blur(22px) saturate(1.7);
    border: 1px solid var(--glass-edge);
    box-shadow:
      0 24px 60px -20px rgba(60, 80, 120, 0.35),
      0 2px 6px rgba(60, 80, 120, 0.12),
      inset 0 1px 0 rgba(255,255,255,0.9),
      inset 0 -22px 40px -28px rgba(120,140,180,0.35);
  }

  /* note-card ruled lines + margin */
  .face::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent calc(var(--rule) - 1px),
        var(--rule-line) calc(var(--rule) - 1px),
        var(--rule-line) var(--rule)
      );
    background-position: 0 calc(var(--rule) * 1.15);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 var(--rule), #000 100%);
            mask-image: linear-gradient(to bottom, transparent 0, #000 var(--rule), #000 100%);
  }
  .face::after {
    content: "";
    position: absolute; top: 0; bottom: 0; left: 2.3rem;
    width: 1.5px;
    background: var(--margin-line);
    pointer-events: none;
  }

  /* glossy specular sweep */
  .face .sheen {
    position: absolute; inset: 0; pointer-events: none; border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 38%);
    mix-blend-mode: screen;
  }

  .content {
    position: relative;
    z-index: 1;
    width: 100%;
    align-self: flex-start;
    line-height: var(--rule);
  }

  .back { transform: rotateY(180deg); }

  /* card typography — sits on the ruled lines */
  .content h2, .content .sideA {
    font-size: 1.5rem;
    font-weight: 600;
    line-height: var(--rule);
    letter-spacing: 0.01em;
    color: var(--ink);
  }
  .content h3, .content h4, .content h5, .content h6 {
    font-size: 1.18rem;
    font-weight: 500;
    line-height: var(--rule);
    color: var(--ink);
  }
  .content p { line-height: var(--rule); color: var(--ink); }
  .content ul, .content ol { line-height: var(--rule); padding-left: 1.4em; color: var(--ink); list-style: none; }
  .content li { line-height: var(--rule); position: relative; }
  .content ul li::before {
    content: "";
    position: absolute; left: -1em; top: calc(var(--rule) / 2 - 3px);
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
  }
  .content ol { counter-reset: li; }
  .content ol li::before { content: counter(li) "."; counter-increment: li; position: absolute; left: -1.4em; color: var(--accent); font-weight: 600; }
  .content strong { font-weight: 650; }
  .content em { font-style: italic; }
  .content code {
    font-family: "SF Mono", ui-monospace, monospace;
    font-size: 0.9em;
    background: rgba(120,140,175,0.14);
    padding: 0.05em 0.35em; border-radius: 6px;
  }
  .content .tag {
    display: inline-block;
    font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent); font-weight: 600;
    margin-bottom: 0.2rem;
  }

  /* ---------- controls ---------- */
  .controls {
    position: relative; z-index: 1;
    margin-top: 1.6rem;
    display: flex; align-items: center; gap: 0.6rem;
  }
  button.ctl {
    appearance: none; border: 1px solid var(--glass-edge);
    background: var(--glass);
    backdrop-filter: blur(16px) saturate(1.5);
    -webkit-backdrop-filter: blur(16px) saturate(1.5);
    color: var(--ink);
    font-size: 0.95rem;
    padding: 0.6rem 1.05rem; border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 18px -10px rgba(60,80,120,0.4), inset 0 1px 0 rgba(255,255,255,0.8);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    user-select: none;
  }
  button.ctl:hover { transform: translateY(-1px); }
  button.ctl:active { transform: translateY(0); box-shadow: 0 3px 10px -8px rgba(60,80,120,0.4), inset 0 1px 0 rgba(255,255,255,0.8); }
  button.ctl.icon { width: 2.6rem; height: 2.6rem; padding: 0; font-size: 1.2rem; display: grid; place-items: center; }
  .hint { margin-top: 0.9rem; font-size: 0.78rem; color: var(--ink-soft); opacity: 0.7; letter-spacing: 0.03em; z-index: 1; }

  /* ---------- drop / empty state ---------- */
  .drop {
    position: relative; z-index: 1;
    width: min(86vw, 560px);
    aspect-ratio: 5 / 3;
    border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0.8rem; text-align: center;
    color: var(--ink-soft);
    background: var(--glass);
    backdrop-filter: blur(22px) saturate(1.6);
    -webkit-backdrop-filter: blur(22px) saturate(1.6);
    border: 1.5px dashed rgba(120,140,175,0.45);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8), 0 20px 50px -24px rgba(60,80,120,0.3);
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
    padding: 2rem;
  }
  .drop.hot { border-color: var(--accent); background: rgba(255,255,255,0.6); }
  .drop .big { font-size: 1.25rem; font-weight: 600; color: var(--ink); }
  .drop .sub { font-size: 0.9rem; line-height: 1.5; max-width: 34ch; }
  .drop .pill { margin-top: 0.4rem; font-size: 0.78rem; color: var(--accent); font-weight: 600; letter-spacing: 0.05em; }

  .hidden { display: none !important; }
  input[type=file] { display: none; }
</style>
</head>
<body>
  <div class="ambient"><span class="a"></span><span class="b"></span><span class="c"></span></div>

  <header class="hidden" id="header">
    <h1 id="deckTitle">Flashcards</h1>
    <div class="count" id="count"></div>
  </header>

  <!-- wordmark -->
  <div class="wordmark" id="wordmark">Liquid&nbsp;Flash</div>

  <!-- empty / drop state -->
  <label class="drop" id="drop" for="fileInput">
    <div class="big">Drop a Markdown deck here</div>
    <div class="sub">Each <code>## Heading</code> becomes Side A. Everything beneath it (e.g. <code>#### …</code>) becomes Side B.</div>
    <div class="pill">or click to choose a .md file</div>
  </label>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown" multiple />

  <!-- card stage -->
  <div class="stage hidden" id="stage">
    <div class="card" id="card">
      <div class="face front"><span class="sheen"></span><div class="content" id="frontContent"></div></div>
      <div class="face back"><span class="sheen"></span><div class="content" id="backContent"></div></div>
    </div>
  </div>

  <div class="controls hidden" id="controls">
    <button class="ctl icon" id="prev" title="Previous (←)">‹</button>
    <button class="ctl" id="flip" title="Flip (Space)">Flip</button>
    <button class="ctl icon" id="next" title="Next (→)">›</button>
    <button class="ctl icon" id="shuffle" title="Shuffle (S)">⤮</button>
    <button class="ctl icon" id="load" title="Load another deck">↺</button>
  </div>

  <div class="hint hidden" id="hint">Space flips · ← → moves · S shuffles</div>

<script>
  // ---------- tiny markdown renderer (headings, bold, italic, code, lists) ----------
  function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderInline(s){
    s = escapeHtml(s);
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*]+)\*/g, '$1<em>$2</em>');
    s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
    return s;
  }

  function renderMarkdown(md){
    const lines = md.split(/\r?\n/);
    let html = '', listType = null;
    const closeList = () => { if (listType){ html += `</${listType}>`; listType = null; } };
    for (let raw of lines){
      const line = raw.replace(/\s+$/,'');
      if (!line.trim()){ closeList(); continue; }
      const h = line.match(/^(#{1,6})\s+(.*)$/);
      if (h){ closeList(); const lvl = h[1].length; html += `<h${lvl}>${renderInline(h[2])}</h${lvl}>`; continue; }
      const ul = line.match(/^\s*[-*+]\s+(.*)$/);
      const ol = line.match(/^\s*\d+\.\s+(.*)$/);
      if (ul){ if (listType!=='ul'){ closeList(); html += '<ul>'; listType='ul'; } html += `<li>${renderInline(ul[1])}</li>`; continue; }
      if (ol){ if (listType!=='ol'){ closeList(); html += '<ol>'; listType='ol'; } html += `<li>${renderInline(ol[1])}</li>`; continue; }
      closeList();
      html += `<p>${renderInline(line)}</p>`;
    }
    closeList();
    return html;
  }

  // ---------- parse a markdown deck into cards ----------
  // # Title  -> deck title
  // ## ...   -> new card; its text is Side A; following content is Side B
  function parseDeck(md){
    const lines = md.split(/\r?\n/);
    let title = '', cards = [], cur = null;
    for (const raw of lines){
      const h1 = raw.match(/^#\s+(.*)$/);
      const h2 = raw.match(/^##\s+(.*)$/);
      if (h2){ if (cur) cards.push(cur); cur = { a: h2[1].trim(), bLines: [] }; continue; }
      if (h1 && !cur){ title = h1[1].trim(); continue; }
      if (cur) cur.bLines.push(raw);
    }
    if (cur) cards.push(cur);
    cards = cards.map(c => ({ a: c.a, b: c.bLines.join('\n').trim() }));
    return { title, cards };
  }

  // ---------- app state ----------
  let cards = [], idx = 0, deckTitle = 'Flashcards';

  const $ = id => document.getElementById(id);
  const stage = $('stage'), controls = $('controls'), header = $('header'),
        hint = $('hint'), drop = $('drop'), fileInput = $('fileInput'),
        card = $('card'), frontC = $('frontContent'), backC = $('backContent');

  function showDeckUI(on){
    [stage, controls, header, hint].forEach(el => el.classList.toggle('hidden', !on));
    drop.classList.toggle('hidden', on);
    document.getElementById('wordmark').classList.toggle('hidden', on);
  }

  // turn the back's #### (and other) headings into bullet points
  function backToMarkdown(b){
    return b.split(/\r?\n/).map(line => {
      const h = line.match(/^#{3,6}\s+(.*)$/);
      return h ? `- ${h[1]}` : line;
    }).join('\n');
  }

  function render(){
    if (!cards.length) return;
    const c = cards[idx];
    frontC.innerHTML = `<span class="tag">Side A</span><div class="sideA">${renderInline(c.a)}</div>`;
    backC.innerHTML = c.b
      ? `<span class="tag">Side B</span>${renderMarkdown(backToMarkdown(c.b))}`
      : `<span class="tag">Side B</span><p style="opacity:.6">—</p>`;
    card.classList.remove('flipped');
    $('count').textContent = `${idx + 1} / ${cards.length}`;
    $('deckTitle').textContent = deckTitle;
  }

  function flip(){ card.classList.toggle('flipped'); }
  function next(){ if (cards.length){ idx = (idx + 1) % cards.length; render(); } }
  function prev(){ if (cards.length){ idx = (idx - 1 + cards.length) % cards.length; render(); } }
  function shuffle(){
    for (let i = cards.length - 1; i > 0; i--){ const j = Math.floor(Math.random() * (i + 1)); [cards[i], cards[j]] = [cards[j], cards[i]]; }
    idx = 0; render();
  }

  function loadText(text, fallbackName){
    const deck = parseDeck(text);
    if (!deck.cards.length){ drop.classList.add('hot'); setTimeout(()=>drop.classList.remove('hot'),600); alert('No cards found. Make sure the file has "## " headings for Side A.'); return; }
    cards = deck.cards;
    deckTitle = deck.title || fallbackName || 'Flashcards';
    idx = 0;
    showDeckUI(true);
    render();
  }

  function handleFiles(fileList){
    const files = [...fileList].filter(f => /\.(md|markdown|txt)$/i.test(f.name) || f.type === 'text/markdown');
    if (!files.length){ return; }
    let texts = [], names = [];
    let pending = files.length;
    files.forEach(f => {
      const r = new FileReader();
      r.onload = () => {
        texts.push(r.result); names.push(f.name.replace(/\.(md|markdown|txt)$/i,''));
        if (--pending === 0) loadText(texts.join('\n\n'), names.length === 1 ? names[0] : `${names.length} decks`);
      };
      r.readAsText(f);
    });
  }

  // ---------- events ----------
  fileInput.addEventListener('change', e => handleFiles(e.target.files));
  card.addEventListener('click', flip);
  $('flip').addEventListener('click', e => { e.stopPropagation(); flip(); });
  $('next').addEventListener('click', next);
  $('prev').addEventListener('click', prev);
  $('shuffle').addEventListener('click', shuffle);
  $('load').addEventListener('click', () => fileInput.click());

  document.addEventListener('keydown', e => {
    if (!cards.length) return;
    if (e.code === 'Space' || e.code === 'Enter'){ e.preventDefault(); flip(); }
    else if (e.code === 'ArrowRight'){ next(); }
    else if (e.code === 'ArrowLeft'){ prev(); }
    else if (e.key.toLowerCase() === 's'){ shuffle(); }
  });

  // drag & drop anywhere
  ['dragenter','dragover'].forEach(ev => document.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('hot'); }));
  ['dragleave','drop'].forEach(ev => document.addEventListener(ev, e => { e.preventDefault(); if (ev==='drop' || e.target===drop) drop.classList.remove('hot'); }));
  document.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('hot'); if (e.dataTransfer?.files?.length) handleFiles(e.dataTransfer.files); });
</script>
</body>
</html>
